<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - CUSTOM SKATE LACES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Reset & Base Styles - matching your main page */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
            position: relative;
            overflow-x: hidden;
        }

        /* Subtle animated background elements */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(100, 100, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 100, 100, 0.05) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(-30px, 30px) rotate(120deg); }
            66% { transform: translate(30px, -30px) rotate(240deg); }
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            background-color: rgba(20, 20, 20, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Navigation */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-logo {
            max-width: 150px;
            height: auto;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-link {
            color: #cccccc;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 400;
            padding: 8px 16px;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-link.active {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.15);
        }

        /* Page Header */
        .page-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .page-subtitle {
            color: #cccccc;
            font-size: 1.1rem;
            font-weight: 300;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .gallery-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .gallery-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover .gallery-image {
            transform: scale(1.1);
        }

        .gallery-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
            padding: 20px;
            color: white;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover .gallery-overlay {
            transform: translateY(0);
        }

        .gallery-item-title {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .gallery-item-caption {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* Lightbox Modal */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }

        .lightbox-image {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 8px;
        }

        .lightbox-close {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
            padding: 10px;
        }

        .lightbox-caption {
            position: absolute;
            bottom: -40px;
            left: 0;
            color: white;
            font-size: 1rem;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .lightbox-nav:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .lightbox-nav.prev {
            left: 20px;
        }

        .lightbox-nav.next {
            right: 20px;
        }

        /* Back to Home Link */
        .back-to-home {
            text-align: center;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .home-link {
            display: inline-block;
            color: #cccccc;
            text-decoration: none;
            font-size: 1rem;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }
            
            .nav-bar {
                flex-direction: column;
                gap: 20px;
            }
            
            .page-title {
                font-size: 2rem;
            }
            
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 20px;
            }
            
            .lightbox-nav {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .nav-links {
                gap: 15px;
            }
            
            .page-title {
                font-size: 1.8rem;
            }
            
            .gallery-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <div class="nav-bar">
            <img 
                src="https://danabreu88.github.io/Real-Logo/custom-skatelaces-logo.png"
                alt="CUSTOM SKATE LACES" 
                class="nav-logo"
            >
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="gallery.html" class="nav-link active">Gallery</a>
            </div>
        </div>

        <!-- Page Header -->
        <div class="page-header">
            <h1 class="page-title">Gallery</h1>
            <p class="page-subtitle">Explore our collection of custom skate laces and designs</p>
        </div>

        <!-- Gallery Grid -->
        <div class="gallery-grid" id="galleryGrid">
            <!-- Gallery items will be populated by JavaScript -->
        </div>

        <!-- Back to Home Link -->
        <div class="back-to-home">
            <a href="index.html" class="home-link">← Back to Home</a>
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">&times;</button>
        <button class="lightbox-nav prev" id="lightboxPrev">‹</button>
        <button class="lightbox-nav next" id="lightboxNext">›</button>
        <div class="lightbox-content">
            <img class="lightbox-image" id="lightboxImage" src="" alt="">
            <div class="lightbox-caption" id="lightboxCaption"></div>
        </div>
    </div>

    <script>
        // Sample gallery data - REPLACE THESE WITH YOUR ACTUAL IMAGE URLS
        const galleryItems = [
            {
                id: 1,
                imageUrl: 'https://via.placeholder.com/800x800?text=Skate+Laces+1',
                title: 'Classic Red Laces',
                caption: '48" Red Waxed Laces'
            },
            {
                id: 2,
                imageUrl: 'https://via.placeholder.com/800x800?text=Skate+Laces+2',
                title: 'Neon Green',
                caption: '54" Flat Laces'
            },
            {
                id: 3,
                imageUrl: 'https://via.placeholder.com/800x800?text=Skate+Laces+3',
                title: 'Blue Camo',
                caption: 'Custom Pattern Design'
            },
            {
                id: 4,
                imageUrl: 'https://via.placeholder.com/800x800?text=Skate+Laces+4',
                title: 'Black & White',
                caption: 'Classic Style'
            },
            {
                id: 5,
                imageUrl: 'https://via.placeholder.com/800x800?text=Skate+Laces+5',
                title: 'Purple Haze',
                caption: 'Limited Edition'
            },
            {
                id: 6,
                imageUrl: 'https://via.placeholder.com/800x800?text=Skate+Laces+6',
                title: 'Yellow Stripes',
                caption: 'Signature Series'
            }
        ];

        // Populate gallery
        const galleryGrid = document.getElementById('galleryGrid');
        
        galleryItems.forEach(item => {
            const galleryItem = document.createElement('div');
            galleryItem.className = 'gallery-item';
            galleryItem.innerHTML = `
                <img src="${item.imageUrl}" alt="${item.title}" class="gallery-image" loading="lazy">
                <div class="gallery-overlay">
                    <div class="gallery-item-title">${item.title}</div>
                    <div class="gallery-item-caption">${item.caption}</div>
                </div>
            `;
            
            // Add click event for lightbox
            galleryItem.addEventListener('click', () => openLightbox(item.id));
            
            galleryGrid.appendChild(galleryItem);
        });

        // Lightbox functionality
        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.getElementById('lightboxImage');
        const lightboxCaption = document.getElementById('lightboxCaption');
        const lightboxClose = document.getElementById('lightboxClose');
        const lightboxPrev = document.getElementById('lightboxPrev');
        const lightboxNext = document.getElementById('lightboxNext');
        
        let currentImageIndex = 0;

        function openLightbox(itemId) {
            const index = galleryItems.findIndex(item => item.id === itemId);
            if (index !== -1) {
                currentImageIndex = index;
                updateLightboxImage();
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }

        function updateLightboxImage() {
            const item = galleryItems[currentImageIndex];
            lightboxImage.src = item.imageUrl;
            lightboxImage.alt = item.title;
            lightboxCaption.textContent = `${item.title} - ${item.caption}`;
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        function nextImage() {
            currentImageIndex = (currentImageIndex + 1) % galleryItems.length;
            updateLightboxImage();
        }

        function prevImage() {
            currentImageIndex = (currentImageIndex - 1 + galleryItems.length) % galleryItems.length;
            updateLightboxImage();
        }

        // Event listeners
        lightboxClose.addEventListener('click', closeLightbox);
        lightboxPrev.addEventListener('click', prevImage);
        lightboxNext.addEventListener('click', nextImage);

        // Close lightbox with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                closeLightbox();
            } else if (e.key === 'ArrowRight' && lightbox.classList.contains('active')) {
                nextImage();
            } else if (e.key === 'ArrowLeft' && lightbox.classList.contains('active')) {
                prevImage();
            }
        });

        // Close lightbox when clicking outside the image
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
